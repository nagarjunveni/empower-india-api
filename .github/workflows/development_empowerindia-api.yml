# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
 
name: Build and deploy JAR app to Azure Web App - empowerindia
 
on:
  push:
    branches:
      - development
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
 
          
      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

 
      - name: Build with Gradle
        run: ./gradlew clean build
 
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/build/libs/*.jar'
 
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_958B75DDCC424130B382EC9DD280D2F0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_79D3BDE0A8F04C569680C68F4536A4B7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1E186A4C097748BDBB24A65E97131DD7 }}
 
      
 
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'empowerindia'
          slot-name: 'Production'
          package: '*0.0.1-SNAPSHOT.jar'
          
